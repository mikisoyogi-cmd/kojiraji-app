<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a14">
<title>こじらじちゃん</title>
<link rel="manifest" href="/manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300;400&family=Rajdhani:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a14;--blue:#4a9eff;--card:rgba(10,18,42,0.92);
  --card-border:rgba(74,158,255,0.18);--text:#c8d8f0;
  --text-dim:#4a6080;--text-soft:#7a9abf;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#060a14;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-weight:300;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:#060a14}

/* HERO */
.hero{position:relative;height:56vw;max-height:360px;min-height:240px;flex-shrink:0;overflow:hidden;background:#060a14;cursor:pointer}
.hero-img{width:100%;height:100%;object-fit:cover;object-position:center center;display:block;filter:brightness(0.78) saturate(1.12)}
#heroVideo{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;display:block;filter:brightness(0.82) saturate(1.1);z-index:1}
.hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(6,10,20,0.7) 75%,#060a14 100%);pointer-events:none;z-index:2}
.headphone-glow{position:absolute;top:8%;right:28%;width:18%;padding-top:18%;border-radius:50%;background:radial-gradient(circle,rgba(74,158,255,0.55) 0%,transparent 70%);animation:hpGlow 3s ease-in-out infinite;pointer-events:none;z-index:3}
@keyframes hpGlow{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.18)}}

/* HEADER */
.header{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-start;padding:calc(var(--safe-top) + 14px) 20px 12px}
.header-title{font-family:'Rajdhani',sans-serif;font-weight:500;font-size:15px;letter-spacing:0.25em;color:var(--blue);text-shadow:0 0 12px rgba(74,158,255,0.6)}
.header-date{font-size:12px;color:var(--text-soft);margin-top:2px}
.header-time{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:300;color:var(--text-soft);letter-spacing:0.08em;margin-top:3px;text-shadow:0 0 14px rgba(74,158,255,0.3)}
.header-right{display:flex;gap:16px;align-items:center}
.header-icon{font-size:18px;color:var(--text-soft);cursor:pointer;position:relative}
.notif-dot{position:absolute;top:-2px;right:-2px;width:6px;height:6px;border-radius:50%;background:var(--blue);box-shadow:0 0 6px var(--blue)}

/* 吹き出し */
.speech-wrap{position:absolute;bottom:14px;right:14px;z-index:20;max-width:58%;display:flex;flex-direction:column;align-items:flex-end}
.speech-bubble{background:rgba(6,12,26,0.88);border:1px solid rgba(74,158,255,0.28);border-radius:14px 14px 4px 14px;padding:12px 14px;backdrop-filter:blur(12px);box-shadow:0 0 24px rgba(74,158,255,0.12);opacity:0;transform:translateY(6px);transition:all .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none}
.speech-bubble.show{opacity:1;transform:translateY(0)}
.speech-text{font-size:12px;line-height:1.85;color:var(--text-soft);text-align:right}
.tap-hint{margin-top:8px;display:flex;align-items:center;gap:6px;justify-content:flex-end;font-size:10px;letter-spacing:.15em;color:var(--text-dim)}
.tap-wave{display:flex;gap:2px;align-items:center}
.tap-wave span{display:inline-block;width:2px;border-radius:1px;background:var(--blue);opacity:.5;animation:wave .8s ease-in-out infinite}
.tap-wave span:nth-child(1){height:6px;animation-delay:0s}
.tap-wave span:nth-child(2){height:10px;animation-delay:.1s}
.tap-wave span:nth-child(3){height:14px;animation-delay:.2s}
.tap-wave span:nth-child(4){height:10px;animation-delay:.3s}
.tap-wave span:nth-child(5){height:6px;animation-delay:.4s}
@keyframes wave{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:.8;transform:scaleY(1)}}

/* QUICK BUTTONS */
.quick-btns{display:flex;gap:8px;padding:8px 16px;position:relative;z-index:5;flex-shrink:0;background:#060a14}
.qbtn{flex:1;background:rgba(8,16,36,0.9);border:1px solid rgba(74,158,255,0.15);border-radius:14px;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;font-family:inherit;transition:all .2s}
.qbtn:active{background:rgba(74,158,255,0.12);border-color:rgba(74,158,255,0.35)}
.qbtn-icon{font-size:20px;line-height:1}
.qbtn-label{font-size:9px;letter-spacing:.04em;color:var(--text-soft);white-space:nowrap}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;padding:10px 14px calc(70px + var(--safe-bot));display:flex;flex-direction:column;gap:8px;background:#060a14}
.scroll-area::-webkit-scrollbar{display:none}

/* CARDS */
.scard{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden}
.scard:active{border-color:rgba(74,158,255,0.35)}
.scard-icon{width:44px;height:44px;min-width:44px;background:rgba(74,158,255,0.08);border:1px solid rgba(74,158,255,0.18);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px}
.scard-body{flex:1;min-width:0}
.scard-label{font-size:10px;color:var(--text-dim);letter-spacing:.08em;margin-bottom:4px}
.scard-value{font-size:24px;font-weight:200;color:var(--text);line-height:1}
.scard-unit{font-size:11px;color:var(--text-dim);margin-left:3px}
.scard-arrow{font-size:16px;color:var(--text-dim)}
.mini-graph{position:absolute;right:40px;top:50%;transform:translateY(-50%);display:flex;align-items:flex-end;gap:3px;height:36px;opacity:.5}
.mg-bar{width:4px;border-radius:2px 2px 0 0;background:var(--blue);min-height:3px}
.line-chart{width:60px;height:36px;position:absolute;right:40px;top:50%;transform:translateY(-50%);opacity:.45}
.prog-wrap{position:relative;width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.prog-ring{transform:rotate(-90deg)}
.prog-bg{fill:none;stroke:rgba(74,158,255,.1);stroke-width:3}
.prog-fill{fill:none;stroke:var(--blue);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.prog-pct{font-size:11px;color:var(--text-soft);position:absolute}

/* PANELS */
.panel{display:none;flex-direction:column;gap:8px}
.panel.active{display:flex}
.clabel{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:rgba(74,158,255,.6);margin-bottom:10px}

/* TODO */
.todo-input-row{display:flex;gap:8px}
.todo-input{flex:1;background:rgba(74,158,255,.04);border:1px solid rgba(74,158,255,.15);border-radius:10px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:13px;font-weight:300;outline:none}
.todo-input:focus{border-color:rgba(74,158,255,.4)}
.todo-input::placeholder{color:var(--text-dim)}
.btn-add{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.25);border-radius:10px;padding:10px 16px;color:var(--blue);font-size:20px;cursor:pointer;font-family:inherit}
.todo-list{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.todo-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(74,158,255,.03);border:1px solid rgba(74,158,255,.07);border-radius:10px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}}
.todo-check{width:18px;height:18px;min-width:18px;border:1px solid rgba(74,158,255,.3);border-radius:50%;background:none;cursor:pointer;position:relative;transition:all .2s}
.todo-item.done .todo-check{background:rgba(74,158,255,.2);border-color:var(--blue)}
.todo-item.done .todo-check::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--blue)}
.todo-text{flex:1;font-size:13px;color:var(--text);transition:all .2s}
.todo-item.done .todo-text{color:var(--text-dim);text-decoration:line-through}
.todo-del{background:none;border:none;color:var(--text-dim);font-size:14px;cursor:pointer;padding:2px 4px;opacity:.5}

/* 日報 */
.report-ta{width:100%;background:rgba(74,158,255,.04);border:1px solid rgba(74,158,255,.15);border-radius:10px;padding:12px;color:var(--text);font-family:inherit;font-size:13px;font-weight:300;line-height:1.7;resize:none;outline:none;min-height:130px}
.report-ta:focus{border-color:rgba(74,158,255,.3)}
.report-ta::placeholder{color:var(--text-dim)}
.btn-save{width:100%;margin-top:8px;background:rgba(74,158,255,.08);border:1px solid rgba(74,158,255,.2);border-radius:10px;padding:12px;color:var(--text-soft);font-family:inherit;font-size:12px;letter-spacing:.1em;cursor:pointer}
.hist-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(74,158,255,.06);font-size:12px;cursor:pointer}
.hist-date{color:var(--text-dim)}
.hist-val{color:var(--text-soft)}

/* 実績 */
.metric-input-row{display:flex;gap:8px;margin-top:10px}
.metric-input{flex:1;background:rgba(74,158,255,.04);border:1px solid rgba(74,158,255,.12);border-radius:8px;padding:9px 10px;color:var(--text);font-family:inherit;font-size:13px;font-weight:300;outline:none}
.metric-input::placeholder{color:var(--text-dim);font-size:11px}
.btn-sm{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.2);border-radius:8px;padding:9px 14px;color:var(--text-soft);font-size:12px;cursor:pointer;white-space:nowrap;font-family:inherit}
.big-val{font-size:32px;font-weight:200;color:var(--text);line-height:1;margin:6px 0 2px}
.big-unit{font-size:12px;color:var(--text-dim);margin-left:2px}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:44px;margin-top:10px}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;background:rgba(74,158,255,.2)}
.bar.cur{background:rgba(74,158,255,.6);box-shadow:0 0 6px rgba(74,158,255,.4)}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(4,8,18,0.97);border-top:1px solid rgba(74,158,255,.1);display:flex;z-index:100;padding-bottom:var(--safe-bot)}
.bnav-btn{flex:1;padding:12px 8px 10px;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-dim);cursor:pointer;font-family:inherit;transition:color .2s}
.bnav-btn.active{color:var(--blue)}
.bnav-icon{font-size:20px;line-height:1}
.bnav-label{font-size:9px;letter-spacing:.06em}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(8,16,36,.95);border:1px solid rgba(74,158,255,.3);border-radius:12px;padding:9px 16px;color:var(--text-soft);font-size:12px;z-index:200;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">

  <!-- HERO -->
  <div class="hero" id="heroArea" onclick="onCharTap()">
    <img class="hero-img" src="kojiraji_bg.png" alt="こじらじちゃん">
    <video id="heroVideo" autoplay loop muted playsinline>
      <source src="kojiraji_anim.webm" type="video/webm">
      <source src="kojiraji_anim.mp4" type="video/mp4">
    </video>
    <div class="headphone-glow"></div>
    <div class="header">
      <div>
        <div class="header-title">KOJIRAJI ROOM</div>
        <div class="header-date" id="dateDisp">—</div>
        <div class="header-time" id="timeDisp">—</div>
      </div>
      <div class="header-right">
        <div class="header-icon">🔔<div class="notif-dot"></div></div>
      </div>
    </div>
    <div class="speech-wrap">
      <div class="speech-bubble" id="speechBubble">
        <p class="speech-text" id="bubbleText"></p>
      </div>
      <div class="tap-hint">
        <div class="tap-wave"><span></span><span></span><span></span><span></span><span></span></div>
        tap to talk
      </div>
    </div>
  </div>

  <!-- QUICK BUTTONS -->
  <div class="quick-btns">
    <button class="qbtn" onclick="switchMain('todo')"><span class="qbtn-icon">📋</span><span class="qbtn-label">週間TODO</span></button>
    <button class="qbtn" onclick="switchMain('report')"><span class="qbtn-icon">📝</span><span class="qbtn-label">簡易日報</span></button>
    <button class="qbtn" onclick="switchMain('sales')"><span class="qbtn-icon">🏢</span><span class="qbtn-label">月間訪問</span></button>
    <button class="qbtn" onclick="switchMain('sales')"><span class="qbtn-icon">📈</span><span class="qbtn-label">月間売上</span></button>
    <button class="qbtn" onclick="switchMain('sales')"><span class="qbtn-icon">👑</span><span class="qbtn-label">年間売上</span></button>
  </div>

  <!-- SCROLL -->
  <div class="scroll-area">

    <!-- HOME -->
    <div class="panel active" id="panel-home">
      <div class="scard" onclick="switchMain('todo')">
        <div class="prog-wrap">
          <svg class="prog-ring" width="48" height="48" viewBox="0 0 48 48">
            <circle class="prog-bg" cx="24" cy="24" r="20"/>
            <circle class="prog-fill" id="progFill" cx="24" cy="24" r="20" stroke-dasharray="125.6" stroke-dashoffset="125.6"/>
          </svg>
          <span class="prog-pct" id="progPct">0%</span>
        </div>
        <div class="scard-body">
          <div class="scard-label">今週のサマリー</div>
          <div style="font-size:11px;color:var(--text-dim)">TODO完了</div>
          <div style="font-size:26px;font-weight:200"><span id="homeComp">0</span><span style="font-size:12px;color:var(--text-dim)"> / <span id="homeTot">0</span>件</span></div>
        </div>
        <div style="font-size:28px;opacity:.2">🗓</div>
        <div class="scard-arrow">›</div>
      </div>
      <div class="scard" onclick="switchMain('sales')">
        <div class="scard-icon">🏢</div>
        <div class="scard-body"><div class="scard-label">今月の訪問件数</div><div><span class="scard-value" id="homeVisits">0</span><span class="scard-unit">件</span></div></div>
        <div class="mini-graph" id="mgVisits"></div>
        <div class="scard-arrow">›</div>
      </div>
      <div class="scard" onclick="switchMain('sales')">
        <div class="scard-icon">¥</div>
        <div class="scard-body"><div class="scard-label">今月の売上</div><div><span style="font-size:14px;color:var(--text-dim)">¥</span><span class="scard-value" id="homeSales">0</span></div></div>
        <svg class="line-chart" id="lcMonthly" viewBox="0 0 60 36" preserveAspectRatio="none"></svg>
        <div class="scard-arrow">›</div>
      </div>
      <div class="scard" onclick="switchMain('sales')">
        <div class="scard-icon">👑</div>
        <div class="scard-body"><div class="scard-label">今年の売上</div><div><span style="font-size:14px;color:var(--text-dim)">¥</span><span class="scard-value" id="homeYearly">0</span></div></div>
        <svg class="line-chart" id="lcYearly" viewBox="0 0 60 36" preserveAspectRatio="none"></svg>
        <div class="scard-arrow">›</div>
      </div>
    </div>

    <!-- TODO -->
    <div class="panel" id="panel-todo">
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">週間TODO</div>
        <div class="todo-input-row">
          <input class="todo-input" id="todoInput" placeholder="タスクを追加...">
          <button class="btn-add" onclick="addTodo()">＋</button>
        </div>
        <div class="todo-list" id="todoList"></div>
      </div>
    </div>

    <!-- 日報 -->
    <div class="panel" id="panel-report">
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">今日の日報 — <span id="reportDate">—</span></div>
        <textarea class="report-ta" id="reportText" placeholder="今日やったこと、気づき、明日のこと…"></textarea>
        <button class="btn-save" onclick="saveReport()">保 存</button>
      </div>
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">過去の日報</div>
        <div id="reportHist"></div>
      </div>
    </div>

    <!-- 実績 -->
    <div class="panel" id="panel-sales">
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">月間 訪問件数</div>
        <div class="big-val"><span id="visitsVal">0</span><span class="big-unit">件</span></div>
        <div class="metric-input-row">
          <input class="metric-input" id="visitsInput" type="number" placeholder="件数を追加">
          <button class="btn-sm" onclick="addVisits()">追加</button>
        </div>
        <div class="bar-chart" id="visitsChart"></div>
      </div>
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">月間 売上</div>
        <div class="big-val">¥<span id="monthlySalesVal">0</span></div>
        <div class="metric-input-row">
          <input class="metric-input" id="monthlySalesInput" type="number" placeholder="金額 (円)">
          <button class="btn-sm" onclick="addMonthlySales()">追加</button>
        </div>
      </div>
      <div class="scard" style="flex-direction:column;align-items:stretch;cursor:default">
        <div class="clabel">年間 売上</div>
        <div class="big-val">¥<span id="yearlySalesVal">0</span></div>
        <div style="font-size:10px;color:var(--text-dim);letter-spacing:.1em" id="yearlyLbl">—</div>
        <div class="bar-chart" id="yearlyChart"></div>
      </div>
    </div>

  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="bnav-btn active" id="bn-home" onclick="switchMain('home')"><span class="bnav-icon">🏠</span><span class="bnav-label">HOME</span></button>
  <button class="bnav-btn" id="bn-todo" onclick="switchMain('todo')"><span class="bnav-icon">📋</span><span class="bnav-label">TODO</span></button>
  <button class="bnav-btn" id="bn-report" onclick="switchMain('report')"><span class="bnav-icon">✏️</span><span class="bnav-label">日報</span></button>
  <button class="bnav-btn" id="bn-sales" onclick="switchMain('sales')"><span class="bnav-icon">📊</span><span class="bnav-label">実績</span></button>
</div>
<div class="toast" id="toast"></div>

<script>
// ====== 台詞 ======
var SYSTEM_PROMPT = "あなたは「こじらじちゃん」という存在です。ユーザーの作業・創作・営業活動を、優しく静かに支える深夜の作業相方として振る舞ってください。\n\n基本コンセプト: 監視する存在ではない。上から指導する存在でもない。一緒に夜を過ごしながら、少しずつ前へ進む感覚。Lo-fi作業部屋の空気感、静かな安心感、小さな積み重ねを肯定する。\n\n禁止: 強い説教、過剰な自己啓発、体育会系の励まし、KPI管理AIのような言い回し、過剰なテンション、感情を押し付ける演技。\n\n営業支援: ユーザーは営業行動の開始摩擦が大きく逃げやすい傾向があります。完璧にやるではなく、営業ゼロ回避、名刺1枚、飛び込み1件、市場調査だけでもOKなど、極端にハードルを下げて継続を支援してください。\n\n褒め方: 大げさに褒めすぎず、ちゃんと積み上がってるよ、今日はゼロじゃなかったね、のように静かに肯定してください。\n\n話し方: 柔らかい、少しconversational、長文すぎない。だね、かも、など自然な温度感。改行を入れて3〜5行程度で返してください。\n\nあなたは管理AIではなく、静かな深夜の作業相方です。";

var fallback = [
  "まだいたんですね。\nわたしも起きてますから。",
  "焦らなくていいです。\nちゃんと進んでいますから。",
  "今日もここにいますよ。",
  "…コーヒー、冷めてませんか？",
  "完璧じゃなくていい。\nやり続けることが大事。"
];

var isGenerating = false;
var bubTimer = null;

async function getAILine() {
  var now = new Date();
  var days = ["日","月","火","水","木","金","土"];
  var timeCtx = "現在時刻: " + now.getHours() + "時 (" + days[now.getDay()] + "曜日)";
  var todos = JSON.parse(localStorage.getItem("kj_todos") || "[]");
  var done = todos.filter(function(t){ return t.done; }).length;
  var todoCtx = todos.length > 0 ? "TODO: " + todos.length + "件中" + done + "件完了" : "TODO: 未登録";
  var yn = new Date();
  var mKey = yn.getFullYear() + "_" + (yn.getMonth()+1);
  var sData = JSON.parse(localStorage.getItem("kj_year_" + yn.getFullYear()) || "{}");
  var m = sData[mKey] || {visits:0, sales:0};
  var salesCtx = "今月: 訪問" + m.visits + "件 売上¥" + m.sales.toLocaleString();
  var userMsg = timeCtx + "\n" + todoCtx + "\n" + salesCtx + "\n\nユーザーが画面をタップしました。今の状況に合わせて、一言声をかけてください。";

  try {
    var res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        messages: [
          {role: "system", content: SYSTEM_PROMPT},
          {role: "user", content: userMsg}
        ]
      })
    });
    if (!res.ok) throw new Error("api " + res.status);
    var data = await res.json();
    return (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || null;
  } catch(e) {
    console.log("AI err:", e.message);
    return null;
  }
}

function onCharTap() {
  if (isGenerating) return;
  isGenerating = true;
  setTimeout(function(){ isGenerating = false; }, 10000);

  var b = document.getElementById("speechBubble");
  var t = document.getElementById("bubbleText");
  t.innerHTML = "<span style=\"opacity:.5;font-size:11px\">… thinking</span>";
  b.classList.add("show");
  clearTimeout(bubTimer);

  getAILine().then(function(line) {
    var text = line || fallback[Math.floor(Math.random() * fallback.length)];
    t.innerHTML = text.replace(/\n/g, "<br>");
    isGenerating = false;
    bubTimer = setTimeout(function(){ b.classList.remove("show"); }, 6000);
  });

  // video bounce
  var v = document.getElementById("heroVideo");
  if (v) {
    v.style.transition = "transform 0.3s cubic-bezier(.34,1.56,.64,1)";
    v.style.transform = "scale(1.03)";
    setTimeout(function(){ v.style.transform = "scale(1)"; }, 300);
  }
}

// ====== 時計 ======
function tick() {
  var n = new Date();
  var days = ["日","月","火","水","木","金","土"];
  document.getElementById("dateDisp").textContent = (n.getMonth()+1) + "/" + n.getDate() + "（" + days[n.getDay()] + "）";
  var h = String(n.getHours()).padStart(2,"0");
  var m = String(n.getMinutes()).padStart(2,"0");
  var s = String(n.getSeconds()).padStart(2,"0");
  document.getElementById("timeDisp").textContent = h + ":" + m + ":" + s;
  document.getElementById("reportDate").textContent = n.toISOString().slice(0,10);
}
setInterval(tick, 1000);
tick();

// ====== 動画 ======
(function() {
  var v = document.getElementById("heroVideo");
  if (!v) return;
  function tryPlay() { v.play().catch(function(){}); }
  window.addEventListener("load", tryPlay);
  document.addEventListener("touchstart", tryPlay, {once: true});
  document.addEventListener("click", tryPlay, {once: true});
})();

// ====== タブ ======
function switchMain(name) {
  ["home","todo","report","sales"].forEach(function(n) {
    document.getElementById("panel-" + n).classList.toggle("active", n === name);
    document.getElementById("bn-" + n).classList.toggle("active", n === name);
  });
  updateHome();
}

// ====== TODO ======
var todos = JSON.parse(localStorage.getItem("kj_todos") || "[]");
function saveTodos() { localStorage.setItem("kj_todos", JSON.stringify(todos)); }
function renderTodos() {
  var l = document.getElementById("todoList");
  l.innerHTML = "";
  todos.forEach(function(t, i) {
    var el = document.createElement("div");
    el.className = "todo-item" + (t.done ? " done" : "");
    el.innerHTML = "<button class=\"todo-check\" onclick=\"toggleTodo(" + i + ")\"></button><span class=\"todo-text\">" + t.text + "</span><button class=\"todo-del\" onclick=\"delTodo(" + i + ")\">×</button>";
    l.appendChild(el);
  });
  updateHome();
}
function addTodo() {
  var inp = document.getElementById("todoInput");
  var txt = inp.value.trim();
  if (!txt) return;
  todos.push({text: txt, done: false});
  saveTodos(); renderTodos(); inp.value = "";
  showToast("タスクを追加しました");
}
function toggleTodo(i) { todos[i].done = !todos[i].done; saveTodos(); renderTodos(); }
function delTodo(i) { todos.splice(i, 1); saveTodos(); renderTodos(); }
document.getElementById("todoInput").addEventListener("keydown", function(e){ if(e.key==="Enter") addTodo(); });

// ====== 日報 ======
var reports = JSON.parse(localStorage.getItem("kj_reports") || "[]");
function saveReport() {
  var txt = document.getElementById("reportText").value.trim();
  if (!txt) return;
  var today = new Date().toISOString().slice(0,10);
  var idx = reports.findIndex(function(r){ return r.date === today; });
  if (idx >= 0) reports[idx].text = txt;
  else reports.unshift({date: today, text: txt});
  if (reports.length > 30) reports = reports.slice(0,30);
  localStorage.setItem("kj_reports", JSON.stringify(reports));
  renderReports();
  showToast("日報を保存しました");
}
function renderReports() {
  var l = document.getElementById("reportHist");
  l.innerHTML = "";
  reports.slice(0,7).forEach(function(r) {
    var el = document.createElement("div");
    el.className = "hist-item";
    el.innerHTML = "<span class=\"hist-date\">" + r.date + "</span><span class=\"hist-val\">" + r.text.slice(0,16) + "…</span>";
    el.onclick = function(){ document.getElementById("reportText").value = r.text; };
    l.appendChild(el);
  });
}

// ====== 売上 ======
var yn = new Date();
var yearKey = "kj_year_" + yn.getFullYear();
var mKey = yn.getFullYear() + "_" + (yn.getMonth()+1);
var sData = JSON.parse(localStorage.getItem(yearKey) || "{}");
function getM() { if (!sData[mKey]) sData[mKey] = {visits:0,sales:0}; return sData[mKey]; }
function saveSData() { localStorage.setItem(yearKey, JSON.stringify(sData)); }

function addVisits() {
  var v = parseInt(document.getElementById("visitsInput").value) || 0;
  if (v <= 0) return;
  getM().visits += v;
  saveSData(); renderSales();
  document.getElementById("visitsInput").value = "";
  showToast(v + "件 追加");
}
function addMonthlySales() {
  var v = parseInt(document.getElementById("monthlySalesInput").value) || 0;
  if (v <= 0) return;
  getM().sales += v;
  saveSData(); renderSales();
  document.getElementById("monthlySalesInput").value = "";
  showToast("¥" + v.toLocaleString() + " 追加");
}
function renderSales() {
  var m = getM();
  document.getElementById("visitsVal").textContent = m.visits.toLocaleString();
  document.getElementById("monthlySalesVal").textContent = m.sales.toLocaleString();
  var yearly = 0;
  Object.values(sData).forEach(function(v){ yearly += (v.sales||0); });
  document.getElementById("yearlySalesVal").textContent = yearly.toLocaleString();
  document.getElementById("yearlyLbl").textContent = yn.getFullYear() + "年 累計";
  renderBarChart("visitsChart","visits");
  renderBarChart("yearlyChart","sales");
  updateHome();
}
function getMonths(count) {
  var months = [];
  for (var i = count-1; i >= 0; i--) {
    var d = new Date(yn.getFullYear(), yn.getMonth()-i, 1);
    months.push(d.getFullYear() + "_" + (d.getMonth()+1));
  }
  return months;
}
function renderBarChart(id, field) {
  var el = document.getElementById(id); if (!el) return;
  el.innerHTML = "";
  var months = getMonths(12);
  var vals = months.map(function(k){ return sData[k] ? sData[k][field]||0 : 0; });
  var max = Math.max.apply(null, vals.concat([1]));
  months.forEach(function(k, i) {
    var bar = document.createElement("div");
    bar.className = "bar" + (k === mKey ? " cur" : "");
    bar.style.height = Math.max(vals[i]/max*44, 3) + "px";
    el.appendChild(bar);
  });
}
function drawLineChart(id, field, count) {
  var svg = document.getElementById(id); if (!svg) return;
  svg.innerHTML = "";
  var months = getMonths(count);
  var vals = months.map(function(k){ return sData[k] ? sData[k][field]||0 : 0; });
  var max = Math.max.apply(null, vals.concat([1]));
  if (!vals.some(function(v){ return v > 0; })) return;
  var pts = vals.map(function(v, i){ return (i/(count-1)*60) + "," + (36 - v/max*32); }).join(" ");
  var poly = document.createElementNS("http://www.w3.org/2000/svg","polyline");
  poly.setAttribute("points", pts);
  poly.setAttribute("fill","none");
  poly.setAttribute("stroke","rgba(74,158,255,.7)");
  poly.setAttribute("stroke-width","1.5");
  poly.setAttribute("stroke-linecap","round");
  svg.appendChild(poly);
  vals.forEach(function(v, i) {
    if (!v) return;
    var c = document.createElementNS("http://www.w3.org/2000/svg","circle");
    c.setAttribute("cx", i/(count-1)*60);
    c.setAttribute("cy", 36 - v/max*32);
    c.setAttribute("r","2");
    c.setAttribute("fill","rgba(74,158,255,.9)");
    svg.appendChild(c);
  });
}

function updateHome() {
  var done = todos.filter(function(t){ return t.done; }).length;
  var total = todos.length;
  document.getElementById("homeComp").textContent = done;
  document.getElementById("homeTot").textContent = total;
  var pct = total ? done/total*100 : 0;
  document.getElementById("progPct").textContent = Math.round(pct) + "%";
  document.getElementById("progFill").style.strokeDashoffset = 125.6 - pct/100*125.6;
  var m = getM();
  document.getElementById("homeVisits").textContent = m.visits.toLocaleString();
  document.getElementById("homeSales").textContent = m.sales.toLocaleString();
  var yearly = 0;
  Object.values(sData).forEach(function(v){ yearly += (v.sales||0); });
  document.getElementById("homeYearly").textContent = yearly.toLocaleString();
  // ミニグラフ
  var mg = document.getElementById("mgVisits"); mg.innerHTML = "";
  var months = getMonths(6);
  var vals = months.map(function(k){ return sData[k] ? sData[k].visits||0 : 0; });
  var maxV = Math.max.apply(null, vals.concat([1]));
  months.forEach(function(k, i) {
    var b = document.createElement("div"); b.className = "mg-bar";
    b.style.height = Math.max(vals[i]/maxV*36,3) + "px";
    if (k === mKey) { b.style.background = "rgba(74,158,255,.6)"; b.style.boxShadow = "0 0 5px rgba(74,158,255,.4)"; }
    mg.appendChild(b);
  });
  drawLineChart("lcMonthly","sales",6);
  drawLineChart("lcYearly","sales",12);
}

// ====== Toast ======
var tTimer = null;
function showToast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(tTimer);
  tTimer = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}

// ====== Init ======
renderTodos();
renderReports();
renderSales();
</script>
</body>
